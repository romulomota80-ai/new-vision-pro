headersOrigin = "config"
redirectsOrigin = "config"
plugins = []

[functions]

[functions."*"]

[build]
publish = "/root/new-vision-pro"
publishOrigin = "config"

[build.environment]
NODE_VERSION = "20"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/*.png"

[headers.values]
Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
for = "/index.html"

[headers.values]
Cache-Control = "no-cache"

[[headers]]
for = "/"

[headers.values]
Cache-Control = "no-cache"

[[redirects]]
from = "/api/*"
to = "https://api.newvisionpro.com.br/api/:splat"
status = 200.0
force = false

